services:
  # Next.js Application Web Service
  - type: web
    name: hostel-sphere-app
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npx prisma migrate deploy && node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
